global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: nexus-cv-ingestion
    static_configs:
      - targets:
          - ingestion:8001

  - job_name: nexus-cv-serving
    static_configs:
      - targets:
          - serving:8000
    metrics_path: /metrics
