name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: nexus-cv

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check config ingestion fusion intelligence serving mlops dashboard tests scripts models proto
      - run: black --check config ingestion fusion intelligence serving mlops dashboard tests scripts models proto
      - run: mypy config ingestion fusion intelligence serving mlops dashboard/backend proto

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0
      - run: pip install -r requirements-dev.txt pytest-cov
      - run: python scripts/generate_synthetic_streams.py --num-cameras 2 --fps 10 --duration-seconds 2
      - run: pytest tests/ -v --cov=config --cov=ingestion --cov=fusion --cov=intelligence --cov=serving --cov=mlops --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target production -f docker/Dockerfile.serving -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target production -f docker/Dockerfile.serving -t ${{ env.IMAGE_NAME }}:scan .
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: 1
          severity: CRITICAL
