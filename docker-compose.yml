services:
  ingestion:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion
    env_file:
      - .env
    environment:
      - QUARANTINE_DIR=/app/data/quarantine
      - YOLO_MODEL_PATH=/app/models/${YOLO_MODEL_PATH:-yolo11n.pt}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLOPS_REPORTS_DIR=/app/reports
      - MLOPS_TEMP_DATA_DIR=/app/data/mlops/current
      - MLOPS_REFERENCE_DATA_PATH=/app/data/reference/detections.parquet
    volumes:
      - ./data/quarantine:/app/data/quarantine
      - ./models:/app/models
      - ./reports:/app/reports
      - ./data/reference:/app/data/reference:ro
      - ./data/mlops:/app/data/mlops
    ports:
      - "8265:8265"
      - "8001:8000"
    networks:
      - nexus-net
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  serving:
    build:
      context: .
      dockerfile: docker/Dockerfile.serving
      target: production
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLOPS_REPORTS_DIR=/app/reports
      - MLOPS_TEMP_DATA_DIR=/app/data/mlops/current
      - RECORDING_ENABLED=${RECORDING_ENABLED:-false}
      - RECORDING_DB_PATH=/app/data/recordings/nexus_cv.db
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
      - ./data/recordings:/app/data/recordings
      - ./data/mlops:/app/data/mlops
    ports:
      - "8000:8000"
    networks:
      - nexus-net
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5001:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - nexus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.0.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - nexus-net
    restart: unless-stopped
    depends_on:
      ingestion:
        condition: service_healthy
      serving:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - nexus-net
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  mlflow-data:
  prometheus-data:
  grafana-data:

networks:
  nexus-net:
    driver: bridge
